# ===============================================================
# NexT Theme Configuration
# ===============================================================

# ---------------------------------------------------------------
# Theme Scheme
# ---------------------------------------------------------------
scheme: Muse

# ---------------------------------------------------------------
# Dark Mode
# ---------------------------------------------------------------
darkmode: false

# ---------------------------------------------------------------
# Site Information
# ---------------------------------------------------------------
favicon:
  small: /images/favicon-16x16-next.png
  medium: /images/favicon-32x32-next.png
  apple_touch_icon: /images/apple-touch-icon-next.png

# ---------------------------------------------------------------
# Menu
# ---------------------------------------------------------------
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  AI: /ai/ || fa fa-robot
  Data: /data/ || fa fa-database

# ---------------------------------------------------------------
# Sidebar
# ---------------------------------------------------------------
sidebar:
  position: left
  display: post
  padding: 18
  offset: 12
  onmobile: false

# ---------------------------------------------------------------
# Sidebar Avatar
# ---------------------------------------------------------------
avatar:
  url: /images/avatar.gif
  rounded: true

# ---------------------------------------------------------------
# Footer
# ---------------------------------------------------------------
footer:
  since: 2019
  powered:
    enable: false
  copyright:

# ---------------------------------------------------------------
# Table of Contents
# ---------------------------------------------------------------
toc:
  enable: true
  number: true
  max_depth: 4
  wrap: true

# ---------------------------------------------------------------
# Post Settings
# ---------------------------------------------------------------
post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: false
    another_day: false
  categories: true

post_edit:
  enable: false

post_navigation: left

# ---------------------------------------------------------------
# Code Highlight
# ---------------------------------------------------------------
codeblock:
  highlight_theme: normal
  copy_button:
    enable: true
    show_result: false

# ---------------------------------------------------------------
# Back to Top
# ---------------------------------------------------------------
back2top:
  enable: true
  sidebar: false
  scrollpercent: false

# ---------------------------------------------------------------
# Reading Progress
# ---------------------------------------------------------------
reading_progress:
  enable: false

# ---------------------------------------------------------------
# Bookmark
# ---------------------------------------------------------------
bookmark:
  enable: false

# ---------------------------------------------------------------
# Motion
# ---------------------------------------------------------------
motion:
  enable: true
  async: false
  transition:
    post_block: fadeIn
    post_header: slideDownIn
    post_body: slideDownIn
    coll_header: slideLeftIn
    sidebar: slideUpIn

# ---------------------------------------------------------------
# Local Search
# ---------------------------------------------------------------
local_search:
  enable: false

# ---------------------------------------------------------------
# Algolia Search
# ---------------------------------------------------------------
algolia_search:
  enable: false

# ---------------------------------------------------------------
# GitHub Banner
# ---------------------------------------------------------------
github_banner:
  enable: false

# ---------------------------------------------------------------
# Font Settings
# ---------------------------------------------------------------
font:
  enable: false

# ---------------------------------------------------------------
# SEO
# ---------------------------------------------------------------
creative_commons:
  license: by-nc-sa
  sidebar: false
  post: false
  language:

# ---------------------------------------------------------------
# CDN
# ---------------------------------------------------------------
vendors:
  plugins:

# ---------------------------------------------------------------
# Math
# ---------------------------------------------------------------
math:
  every_page: true
  mathjax:
    enable: true
    mhchem: false

# ---------------------------------------------------------------
# Tag Plugins
# ---------------------------------------------------------------
tabs:
  transition:
    tabs: false
    labels: true
note:
  icons:

# ---------------------------------------------------------------
# FancyBox
# ---------------------------------------------------------------
fancybox: false

# ---------------------------------------------------------------
# MediumZoom
# ---------------------------------------------------------------
mediumzoom: false

# ---------------------------------------------------------------
# LazyLoad
# ---------------------------------------------------------------
lazyload: false

# ---------------------------------------------------------------
# Pangu
# ---------------------------------------------------------------
pangu: false

# ---------------------------------------------------------------
# Comments
# ---------------------------------------------------------------
comments:
  style: tabs
  active:
  storage: true
  lazyload: false
  nav:

# ---------------------------------------------------------------
# Custom File Path
# ---------------------------------------------------------------
custom_file_path:

# ---------------------------------------------------------------
# ExP雪
# ---------------------------------------------------------------
pace: false
pjax: false
